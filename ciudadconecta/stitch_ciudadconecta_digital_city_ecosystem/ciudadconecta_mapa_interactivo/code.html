<script>
        function showBusinessDetail(index) {
            const slider = document.getElementById('results-slider');
            const cards = slider.querySelectorAll('.flex-shrink-0');
            if (cards[index]) {
                cards[index].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                
                // Visual feedback on card
                cards[index].classList.add('ring-2', 'ring-primary', 'bg-surface');
                setTimeout(() => {
                    cards[index].classList.remove('ring-2', 'ring-primary', 'bg-surface');
                }, 2000);
            }
        }

        // Handle safe area for mobile devices (iOS notch/home indicator)
        function updateBottomNavHeight() {
            const safeAreaBottom = getComputedStyle(document.documentElement).getPropertyValue('--safe-area-inset-bottom') || '0px';
            document.querySelector('nav').style.paddingBottom = `calc(8px + ${safeAreaBottom})`;
        }
        
        window.addEventListener('load', updateBottomNavHeight);
        window.addEventListener('resize', updateBottomNavHeight);
    </script>
